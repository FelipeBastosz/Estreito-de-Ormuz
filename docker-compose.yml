# ============================================================
# REDE INTERNA
# Todos os contêineres se comunicam pelo nome do serviço.
# Exemplo: broker1 é acessível em "broker1:9081" para qualquer contêiner.
# ============================================================
networks:
  ormuz-net:
    driver: bridge

# ============================================================
# VOLUMES COMPARTILHADOS
# Cada broker persiste seu estado em um volume separado.
# Se o contêiner cair e subir novamente, o estado é recuperado.
# ============================================================
volumes:
  state-broker1:
  state-broker2:
  state-broker3:
  state-broker4:

services:

  # ============================================================
  # BROKERS (um por setor)
  # ============================================================

  broker1:
    build:
      context: .
      dockerfile: Dockerfile.broker
    command: ["1"]
    environment:
      CONFIG_PATH: /app/config.json
    volumes:
      - state-broker1:/app/state
      - ./config.json:/app/config.json
    networks:
      - ormuz-net
    ports:
      - "0.0.0.0:9081:9081"   # Expõe para debug externo se necessário
    restart: on-failure

  broker2:
    build:
      context: .
      dockerfile: Dockerfile.broker
    command: ["2"]
    environment:
      CONFIG_PATH: /app/config.json
    volumes:
      - state-broker2:/app/state
      - ./config.json:/app/config.json
    networks:
      - ormuz-net
    ports:
      - "0.0.0.0:9082:9082"
    restart: on-failure

  broker3:
    build:
      context: .
      dockerfile: Dockerfile.broker
    command: ["3"]
    environment:
      CONFIG_PATH: /app/config.json
    volumes:
      - state-broker3:/app/state
      - ./config.json:/app/config.json
    networks:
      - ormuz-net
    ports:
      - "0.0.0.0:9083:9083"
    restart: on-failure

  broker4:
    build:
      context: .
      dockerfile: Dockerfile.broker
    command: ["4"]
    environment:
      CONFIG_PATH: /app/config.json
    volumes:
      - state-broker4:/app/state
      - ./config.json:/app/config.json
    networks:
      - ormuz-net
    ports:
      - "0.0.0.0:9084:9084"
    restart: on-failure

  # ============================================================
  # DRONES (frota compartilhada entre todos os setores)
  # ============================================================

  drone1:
    build:
      context: .
      dockerfile: Dockerfile.drone
    command: ["drone1", "drone1:9091", "broker1:9081"]
    networks:
      - ormuz-net
    ports:
      - "9091:9091"
    depends_on:
      - broker1
    restart: on-failure

  drone2:
    build:
      context: .
      dockerfile: Dockerfile.drone
    command: ["drone2", "drone2:9092", "broker2:9082"]
    networks:
      - ormuz-net
    ports:
      - "9092:9092"
    depends_on:
      - broker2
    restart: on-failure

  drone3:
    build:
      context: .
      dockerfile: Dockerfile.drone
    command: ["drone3", "drone3:9093", "broker3:9083"]
    networks:
      - ormuz-net
    ports:
      - "9093:9093"
    depends_on:
      - broker3
    restart: on-failure

  drone4:
    build:
      context: .
      dockerfile: Dockerfile.drone
    # Corrigido para apontar e depender do broker4
    command: ["drone4", "drone4:9094", "broker4:9084"]
    networks:
      - ormuz-net
    ports:
      - "9094:9094"
    depends_on:
      - broker4
    restart: on-failure

  # ============================================================
  # SENSORES (cada setor tem 2 sensores independentes)
  # ============================================================

  # Setor 1 (broker1)
  sensor-s1a:
    build:
      context: .
      dockerfile: Dockerfile.sensor
    command: ["S1A", "setor-1", "broker1:9081"]
    environment:
      SENSOR_INTERVALO_MIN: "15"
      SENSOR_INTERVALO_MAX: "20"
    networks:
      - ormuz-net
    depends_on:
      - broker1
    restart: on-failure

  sensor-s1b:
    build:
      context: .
      dockerfile: Dockerfile.sensor
    command: ["S1B", "setor-1", "broker1:9081"]
    environment:
      SENSOR_INTERVALO_MIN: "15"
      SENSOR_INTERVALO_MAX: "20"
    networks:
      - ormuz-net
    depends_on:
      - broker1
    restart: on-failure

  # Setor 2 (broker2)
  sensor-s2a:
    build:
      context: .
      dockerfile: Dockerfile.sensor
    command: ["S2A", "setor-2", "broker2:9082"]
    environment:
      SENSOR_INTERVALO_MIN: "15"
      SENSOR_INTERVALO_MAX: "20"
    networks:
      - ormuz-net
    depends_on:
      - broker2
    restart: on-failure

  sensor-s2b:
    build:
      context: .
      dockerfile: Dockerfile.sensor
    command: ["S2B", "setor-2", "broker2:9082"]
    environment:
      SENSOR_INTERVALO_MIN: "15"
      SENSOR_INTERVALO_MAX: "20"
    networks:
      - ormuz-net
    depends_on:
      - broker2
    restart: on-failure

  # Setor 3 (broker3)
  sensor-s3a:
    build:
      context: .
      dockerfile: Dockerfile.sensor
    command: ["S3A", "setor-3", "broker3:9083"]
    environment:
      SENSOR_INTERVALO_MIN: "20"
      SENSOR_INTERVALO_MAX: "25"
    networks:
      - ormuz-net
    depends_on:
      - broker3
    restart: on-failure

  sensor-s3b:
    build:
      context: .
      dockerfile: Dockerfile.sensor
    command: ["S3B", "setor-3", "broker3:9083"]
    environment:
      SENSOR_INTERVALO_MIN: "10"
      SENSOR_INTERVALO_MAX: "15"
    networks:
      - ormuz-net
    depends_on:
      - broker3
    restart: on-failure

  # Setor 4 (broker4)
  sensor-s4a:
    build:
      context: .
      dockerfile: Dockerfile.sensor
    command: ["S4A", "setor-4", "broker4:9084"]
    environment:
      SENSOR_INTERVALO_MIN: "16"
      SENSOR_INTERVALO_MAX: "22"
    networks:
      - ormuz-net
    depends_on:
      - broker4
    restart: on-failure

  sensor-s4b:
    build:
      context: .
      dockerfile: Dockerfile.sensor
    command: ["S4B", "setor-4", "broker4:9084"]
    environment:
      SENSOR_INTERVALO_MIN: "10"
      SENSOR_INTERVALO_MAX: "15"
    networks:
      - ormuz-net
    depends_on:
      - broker4
    restart: on-failure

  # ============================================================
  # CLIENTE INTERATIVO (Injeção Manual de Dados)
  # ============================================================
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    networks:
      - ormuz-net
    stdin_open: true
    tty: true